name: CI

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-check:
    name: Python Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uvx ruff check ai dashboard storage baseline feedback

      - name: Ruff format check
        run: uvx ruff format ai dashboard storage baseline feedback --check

      - name: Import smoke check
        run: uv run python -c "import ai.consumer; import ai.model; import dashboard.main"

  go-check:
    name: Go Checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [ingestion, correlation, alerts]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...

  rust-check:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: agent
        run: cargo check

      - name: Cargo test
        working-directory: agent
        run: cargo test

  dockerfiles:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfiles: |
            Dockerfile.ai
            Dockerfile.dashboard
            agent/Dockerfile
            ingestion/Dockerfile
            correlation/Dockerfile
            alerts/Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3009

  compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [python-check, go-check, rust-check, dockerfiles]

    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          DB_USER=anomaly
          DB_PASSWORD=ci_local_password
          DB_NAME=anomalydb
          GF_ADMIN_PASSWORD=admin
          ALERT_WEBHOOK_URL=
          EOF

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Show status
        run: docker compose ps

      - name: Check service logs
        run: docker compose logs --tail=100 ai-consumer dashboard ingestion correlation alerter agent prometheus grafana

      - name: Verify services inside containers
        run: |
          docker exec web-dashboard python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8000/').status)"
          docker exec prometheus wget -qO- http://127.0.0.1:9090/-/healthy
          docker exec grafana sh -lc "wget -qO- http://127.0.0.1:3000/api/health"

      - name: Cleanup
        if: always()
        run: docker compose down -v
