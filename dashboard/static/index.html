<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>System Intelligence Observer</h1>
        <p class="subtitle">Real-time Telemetry & Anomaly Detection Pipeline</p>
    </header>

    <div class="dashboard-grid">
        <!-- Live Metrics Panel -->
        <div class="glass-panel">
            <div class="panel-header">
                <span>Active Agent</span>
                <span class="pulse-indicator"></span>
            </div>
            <div id="agent-id" class="agent-badge">Waiting for connection...</div>
            
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">CPU Utilization</div>
                    <div class="metric-value"><span id="cpu-val">0.0</span><span class="metric-unit">%</span></div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Memory Usage</div>
                    <div class="metric-value"><span id="mem-val">0.0</span><span class="metric-unit">GB</span></div>
                </div>
            </div>

            <!-- Chart -->
            <div class="chart-container">
                <canvas id="telemetryChart"></canvas>
            </div>
        </div>

        <!-- Anomaly Events Panel -->
        <div class="glass-panel">
            <div class="panel-header">Intelligence Event Log</div>
            <div class="event-log" id="event-log">
                <!-- Javascript will populate logs here -->
            </div>
            
            <div class="anomaly-score-box">
                <div class="metric-label">Current Anomaly Risk Score</div>
                <div class="metric-value status-safe" id="score-val">-0.000</div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
