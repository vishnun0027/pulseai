
# ==============================================================================
# PulseAI — Docker Compose Orchestration
# Copy .env.example -> .env and set real values before running.
# Usage: docker compose up --build
# ==============================================================================

services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-broker
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Database: TimescaleDB (PostgreSQL + time-series extension) ──────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-anomaly}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      - POSTGRES_DB=${DB_NAME:-anomalydb}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anomaly} -d ${DB_NAME:-anomalydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Go: Ingestion API ──────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: ingestion-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Go: Correlation Engine ──────────────────────────────────────────────────
  correlation:
    build:
      context: .
      dockerfile: correlation/Dockerfile
    container_name: correlation-engine
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Go: Alert Dispatcher ────────────────────────────────────────────────────
  alerter:
    build:
      context: .
      dockerfile: alerts/Dockerfile
    container_name: alert-dispatcher
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Python: ML AI Consumer ──────────────────────────────────────────────────
  ai-consumer:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: ai-worker
    ports:
      - "9090:9090"   # Prometheus metrics scrape
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=${DB_USER:-anomaly}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      - DB_NAME=${DB_NAME:-anomalydb}
      - METRICS_PORT=9090
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # ─── Python: Web Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: web-dashboard
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=${DB_USER:-anomaly}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      - DB_NAME=${DB_NAME:-anomalydb}
    depends_on:
      - ai-consumer
      - timescaledb
    restart: unless-stopped

  # ─── Rust: Telemetry Agent ───────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: telemetry-agent
    environment:
      - TELEMETRY_URL=http://ingestion:8080/v1/telemetry
    depends_on:
      - ingestion
    restart: unless-stopped

  # ─── Observability: Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"   # Prometheus UI (9090 is taken by ai-worker exporter)
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ai-consumer
      - ingestion
    restart: unless-stopped

  # ─── Observability: Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  timescaledb_data:
  grafana_data:
